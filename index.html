<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riya Portfolio</title>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="accent">Riya</span>
        </div>
        <nav>
            <li>Home</li>
            <li>About</li>
            <li>Services</li>
            <li>Contact</li>
            <li>FAQ</li>
        </nav>
    </header>
 <main>

  <section id="hero" class="hero-section">
    <div class="hero-blob hero-blob-right"></div>
    <div class="hero-blob hero-blob-left"></div>
    <div class="container">
      <div class="hero-grid">
        <div class="hero-content">
          <p class="hero-label reveal in accent" style="font-weight: bold;">
            Available for work
          </p>
          <h1 class="hero-title reveal d1 in">
            Hi, I'm <span class="accent">Riya</span>
          </h1>

          <p class="hero-description reveal d2 in">
            Freelance
            <strong>Frontend Developer</strong>.
            I design and build digital products that people love to use -
            fast, clean, and accessible.
          </p>

          <div class="hero-actions reveal d3 in">

            <a href="#work" class="btn btn-primary shimmer">
              View my work
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M19 9l-7 7-7-7"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                </path>
              </svg>
            </a>

            <a href="#contact" class="btn btn-secondary">
              Get in touch
            </a>

          </div>

          <!-- <div class="hero-stats reveal d4 in">

            <div class="stat">
              <p class="stat-number">3+</p>
              <p class="stat-label">Projects done</p>
            </div>

            <div class="stat">
              <p class="stat-number">5+</p>
              <p class="stat-label">Happy clients</p>
            </div>

            <div class="stat">
              <p class="stat-number">0y</p>
              <p class="stat-label">Experience</p>
            </div>

          </div> -->

        </div>

        <div class="hero-image-wrapper reveal d2 in">

          <div class="hero-image-card">

            <div class="pf">
              <img
                src="profile.jpg"
                alt="Riya">
            </div>

            <div class="status-badge">
              Open to projects
            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

</main>
</body>
</html>
